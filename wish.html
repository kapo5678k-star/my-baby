<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق الأمنيات</title>

<style>
* { box-sizing: border-box; }
/* كرت الفيديو الأخير فقط */

.last-video-card {
    padding: 10px;
}

/* الفيديو نفسه */
.last-video {
    width: 1%;
    height: 550px;          /* المقاس اللي تحبيه */
    border-radius: 18px;
    object-fit: cover;     /* TikTok style */
    background: black;
}

/* لو عايزة تمنعي أي تكبير غصب */
.last-video::-webkit-media-controls-fullscreen-button {
    display: none;
}
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #7b0000, #b30000);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: stretch;
}

.lock-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.snowflake {
    position: fixed;
    top: -10px;
    color: white;
    pointer-events: none;
    animation: fall linear infinite;
    opacity: .9;
    z-index: 1;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    z-index: 2;
}

.card {
    background: #fff;
    border-radius: 30px;
    padding: 25px 20px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.year {
    background: #b22222;
    color: white;
    padding: 8px 30px;
    border-radius: 25px;
    font-size: 18px;
    display: inline-block;
    animation: yearPulse 2.5s ease-in-out infinite;
}
@keyframes yearPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-4px); }
    100% { transform: scale(1); }
}

.wave {
    animation: wave 3s ease-in-out infinite;
}
@keyframes wave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: 1px solid #ddd;
    font-size: 16px;
    margin-top: 15px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border-radius: 35px;
    background: #b22222;
    color: white;
    border: none;
    font-size: 17px;
    cursor: pointer;
}
.next-btn {
    width: fit-content !important;
    display: block;
    margin-left: auto !important;
    margin-right: auto !important;
    padding: 12px 32px !important;
    font-size: 15px !important;
    border-radius: 30px !important;
    background: linear-gradient(135deg, #ff4d6d, #b30000) !important;
    color: white !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold !important;
    margin-top: 16px !important;
}

.icons span {
    font-size: 26px;
    margin: 6px;
    display: inline-block;
    animation: wave 2.6s ease-in-out infinite;
}
.icons span:nth-child(2){animation-delay:.2s}
.icons span:nth-child(3){animation-delay:.4s}
.icons span:nth-child(4){animation-delay:.6s}
.icons span:nth-child(5){animation-delay:.8s}

.dear {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #b30000;
    text-shadow:
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,200,200,0.8),
        0 0 20px rgba(255,150,150,0.9);
    animation: softWave 4s ease-in-out infinite;
}
@keyframes softWave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

.letter-wrapper {
    max-height: 55vh;
    overflow-y: auto;
    padding-right: 5px;
}
.letter {
    text-align: right;
    line-height: 2.1;
    color: #7b0000;
    font-size: 15.5px;
    font-weight: 700;
}
.letter-paragraph {
    margin-bottom: 24px;
}

.header-bar {
    background: #ff7aa2;
    color: white;
   
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    text-align: center;
}
.memories-title {
    color: #ffb3c6;
    font-size: 26px;
    font-family: cursive;
    margin: 10px 0 20px;
    text-align: center;
}
.memory-card {
    background: #fff;
    border-radius: 25px;
    padding: 12px;
    margin-bottom: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,.25);
    position: relative;
}
.memory-card img,
.memory-card video {
    width: 100%;
    border-radius: 18px;
}
.memory-text {
    text-align: center;
    margin-top: 10px;
    color: #7b0000;
    font-weight: bold;
}
.footer-text {
    text-align: center;
    color: #ffdcdc;
    font-size: 18px;
    margin: 30px 0 15px;
}
.footer-btn {
    background: #ff7aa2;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 18px;
}

/* ===== الإضافة الوحيدة ===== */
.hidden-video { display: none; }
.video-wrapper { position: relative; }
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 32px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
}
</style>

<script>
// ========== الثلج ==========
function createSnowflake() {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "♥️";
    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (Math.random()*10+10)+"px";
    s.style.animationDuration = (Math.random()*5+5)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
}
setInterval(createSnowflake, 300);

// ========== الموسيقى العامة ==========
const AUDIO_SRC = "https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3";

document.addEventListener("DOMContentLoaded", () => {
    const bgMusic = document.createElement('audio');
    bgMusic.id = 'bgMusic';
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.preload = 'auto';
    bgMusic.src = AUDIO_SRC;
    document.body.appendChild(bgMusic);

    if (localStorage.getItem('playAudio') === 'true') {
        // كمّل من نفس المكان اللي وقف عنده
        const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
        bgMusic.addEventListener('canplay', () => {
            bgMusic.currentTime = savedTime;
            bgMusic.play().catch(() => {
                document.addEventListener('click', () => {
                    if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
                }, { once: true });
            });
        }, { once: true });

        // احفظ الـ currentTime كل ثانية
        setInterval(() => {
            if (!bgMusic.paused) {
                localStorage.setItem('audioTime', bgMusic.currentTime);
            }
        }, 1000);

        // احفظ قبل ما الصفحة تتغير
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioTime', bgMusic.currentTime);
        });
    }

    document.querySelectorAll('video').forEach(video => {
        video.addEventListener('play', () => {
            document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
            bgMusic.pause();
        });
        video.addEventListener('pause', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
        video.addEventListener('ended', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
    });
});

function startWithAudio() {
    localStorage.setItem('playAudio', 'true');
    const bg = document.getElementById('bgMusic');
    if (bg) bg.play().catch(()=>{});
    window.location.href = 'timeline.html';
}

function playVideo() {
    const v = document.getElementById("mainVideo");
    const b = document.getElementById("playBtn");
    if (v) { v.style.display = "block"; v.play(); }
    if (b) b.style.display = "none";
}
</script>

<style>
body { padding: 30px 16px 50px; }
.page-title { text-align:center; color:#fff; font-size:26px; font-weight:900; margin-bottom:6px; text-shadow:0 2px 8px rgba(0,0,0,.4); }
.page-sub { text-align:center; color:#ffb3c6; font-size:15px; margin-bottom:28px; }
.wish-input-wrap { max-width:420px; margin:0 auto 20px; background:#fff; border-radius:28px; padding:24px 20px; box-shadow:0 8px 28px rgba(0,0,0,.2); }
.wish-input-wrap textarea { width:100%; border:2px solid #ffb3c6; border-radius:18px; padding:14px; font-size:16px; font-family:Arial,sans-serif; resize:none; outline:none; color:#7b0000; height:110px; box-sizing:border-box; direction:rtl; }
.wish-input-wrap textarea:focus { border-color: #ff4d6d; }
.send-btn { margin-top:14px; width:100%; padding:14px; background:linear-gradient(135deg,#ff4d6d,#b30000); color:white; border:none; border-radius:30px; font-size:17px; font-weight:bold; cursor:pointer; }
.sky-canvas-wrap { position:relative; max-width:420px; margin:0 auto; height:260px; border-radius:28px; overflow:hidden; background:linear-gradient(180deg,#0a0a2e,#1a1a4e); box-shadow:0 8px 28px rgba(0,0,0,.4); }
#skyCanvas { width:100%; height:100%; display:block; }
.wish-list { max-width:420px; margin:20px auto 0; display:flex; flex-direction:column; gap:12px; }
.wish-item { background:#fff; border-radius:20px; padding:14px 18px; font-size:15px; color:#7b0000; font-weight:bold; box-shadow:0 4px 14px rgba(0,0,0,.15); display:flex; align-items:center; gap:10px; }
</style>
<script>
const bgStars=[], shootingStars=[];
function initCanvas(){
    const c=document.getElementById('skyCanvas'), ctx=c.getContext('2d');
    c.width=c.offsetWidth; c.height=c.offsetHeight;
    for(let i=0;i<80;i++) bgStars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.3,o:Math.random()});
    animSky(c,ctx);
}
function animSky(c,ctx){
    ctx.clearRect(0,0,c.width,c.height);
    bgStars.forEach(s=>{s.o+=(Math.random()-0.5)*0.04;s.o=Math.max(0.1,Math.min(1,s.o));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.o})`;ctx.fill();});
    shootingStars.forEach((ss,i)=>{ss.x+=ss.vx;ss.y+=ss.vy;ss.life--;const a=ss.life/ss.maxLife;ctx.beginPath();ctx.moveTo(ss.x,ss.y);ctx.lineTo(ss.x-ss.vx*8,ss.y-ss.vy*8);ctx.strokeStyle=`rgba(255,220,180,${a})`;ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(ss.x,ss.y,3,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,200,${a})`;ctx.fill();if(ss.life<=0)shootingStars.splice(i,1);});
    requestAnimationFrame(()=>animSky(c,ctx));
}
function launchStar(){const c=document.getElementById('skyCanvas');const angle=-(Math.random()*30+20)*Math.PI/180;const speed=Math.random()*3+4;shootingStars.push({x:Math.random()*c.width*0.5,y:c.height*0.8,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:80,maxLife:80});}
function sendWish(){const txt=document.getElementById('wishInput').value.trim();if(!txt)return;for(let i=0;i<3;i++)setTimeout(launchStar,i*200);const list=document.getElementById('wishList');const item=document.createElement('div');item.className='wish-item';item.innerHTML=`<span>⭐</span> ${txt}`;list.prepend(item);document.getElementById('wishInput').value='';}
document.addEventListener('DOMContentLoaded',initCanvas);
</script>
</head>
<body>
<div class="page-title">🌠 صندوق الأمنيات</div>
<div class="page-sub">اكتبي أمنيتك وشوفيها تتحول لنجمة ✨</div>
<div class="sky-canvas-wrap"><canvas id="skyCanvas"></canvas></div>
<div class="wish-input-wrap">
    <textarea id="wishInput" placeholder="اكتبي أمنيتك هنا..."></textarea>
    <button class="send-btn" onclick="sendWish()">🌟 أطلقي النجمة</button>
</div>
<div class="wish-list" id="wishList"></div>
<div style="max-width:420px;margin:24px auto 0;text-align:center;">
    <button class="next-btn" onclick="window.location.href='poem.html'">اللي بعده👈</button>
</div>
</body></html>
