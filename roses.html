body {

    overflow: hidden;
}

    pointer-events: none;
    animation: fall linear infinite;
    opacity: .9;
    z-index: 1;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;

}

}

    background: #b22222;

    display: inline-block;

}
@keyframes yearPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-4px); }
    100% { transform: scale(1); }
}

.wave {
    animation: wave 3s ease-in-out infinite;
}

    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }

input {

button {

.next-btn {

<script>
// ========== الثلج ==========
function createSnowflake() {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "♥️";
    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (Math.random()*10+10)+"px";
    s.style.animationDuration = (Math.random()*5+5)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
}
setInterval(createSnowflake, 300);

// ========== الموسيقى العامة ==========
const AUDIO_SRC = "https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3";

document.addEventListener("DOMContentLoaded", () => {
    const bgMusic = document.createElement('audio');
    bgMusic.id = 'bgMusic';
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.preload = 'auto';
    bgMusic.src = AUDIO_SRC;
    document.body.appendChild(bgMusic);

    if (localStorage.getItem('playAudio') === 'true') {
        // كمّل من نفس المكان اللي وقف عنده
        const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
        bgMusic.addEventListener('canplay', () => {
            bgMusic.currentTime = savedTime;
            bgMusic.play().catch(() => {
                document.addEventListener('click', () => {
                    if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
                }, { once: true });
            });
        }, { once: true });

        // احفظ الـ currentTime كل ثانية
        setInterval(() => {
            if (!bgMusic.paused) {
                localStorage.setItem('audioTime', bgMusic.currentTime);
            }
        }, 1000);

        // احفظ قبل ما الصفحة تتغير
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioTime', bgMusic.currentTime);
        });
    }

    document.querySelectorAll('video').forEach(video => {
        video.addEventListener('play', () => {
            document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
            bgMusic.pause();
        });
        video.addEventListener('pause', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
        video.addEventListener('ended', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
    });
});

function startWithAudio() {
    localStorage.setItem('playAudio', 'true');
    const bg = document.getElementById('bgMusic');
    if (bg) bg.play().catch(()=>{});
    window.location.href = 'timeline.html';
}

function playVideo() {
    const v = document.getElementById("mainVideo");
    const b = document.getElementById("playBtn");
    if (v) { v.style.display = "block"; v.play(); }
    if (b) b.style.display = "none";
}
</script>

const total = 7;

function openRose(el) {
  // wiggle animation
  el.classList.add('wiggle');
  setTimeout(() => el.classList.remove('wiggle'), 700);

  // fill the message
  const msg = el.getAttribute('data-msg');
  el.querySelector('.rose-msg').textContent = msg;

  // toggle open
  const wasOpen = el.classList.contains('open');
  // close all others
  document.querySelectorAll('.rose-pot.open').forEach(r => r.classList.remove('open'));

  if (!wasOpen) {
    el.classList.add('open');
    // count unique opens
    if (!el.dataset.seen) {
      el.dataset.seen = '1';
      openedCount++;
      updateCount();
      spawnPetals();
    }
  }
}

function updateCount() {
  const msg = document.getElementById('countMsg');
  if (openedCount < total) {
    msg.textContent = `فتحتي ${openedCount} من ${total} ورود 🌹 كملي!`;
  } else {
    msg.textContent = `🎉 فتحتي كل الورود! شوفتي قد إيه بتحبك؟ 💕`;
    document.getElementById('nextBtn').style.display = 'inline-block';
    allOpened();
  }
}

function allOpened() {
  // burst of petals
  for (let i = 0; i < 30; i++) {
    setTimeout(() => spawnPetals(), i * 80);
  }
}

function spawnPetals() {
  const emojis = ['🌹','🌸','🌺','💕','✨','🌷'];
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (16 + Math.random() * 14) + 'px';
    p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// bتلات هادئة في البداية
setInterval(() => {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = '🌹';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.fontSize = '16px';
  p.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(p);
  p.addEventListener('animationend', () => p.remove());
}, 1200);
</script>
