<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سؤال مهم 💭</title>

<style>
* { box-sizing: border-box; }
/* كرت الفيديو الأخير فقط */

.last-video-card {
    padding: 10px;
}

/* الفيديو نفسه */
.last-video {
    width: 1%;
    height: 550px;          /* المقاس اللي تحبيه */
    border-radius: 18px;
    object-fit: cover;     /* TikTok style */
    background: black;
}

/* لو عايزة تمنعي أي تكبير غصب */
.last-video::-webkit-media-controls-fullscreen-button {
    display: none;
}
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #7b0000, #b30000);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: stretch;
}

.lock-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.snowflake {
    position: fixed;
    top: -10px;
    color: white;
    pointer-events: none;
    animation: fall linear infinite;
    opacity: .9;
    z-index: 1;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    z-index: 2;
}

.card {
    background: #fff;
    border-radius: 30px;
    padding: 25px 20px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.year {
    background: #b22222;
    color: white;
    padding: 8px 30px;
    border-radius: 25px;
    font-size: 18px;
    display: inline-block;
    animation: yearPulse 2.5s ease-in-out infinite;
}
@keyframes yearPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-4px); }
    100% { transform: scale(1); }
}

.wave {
    animation: wave 3s ease-in-out infinite;
}
@keyframes wave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: 1px solid #ddd;
    font-size: 16px;
    margin-top: 15px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border-radius: 35px;
    background: #b22222;
    color: white;
    border: none;
    font-size: 17px;
    cursor: pointer;
}
.next-btn {
    width: fit-content !important;
    display: block;
    margin-left: auto !important;
    margin-right: auto !important;
    padding: 12px 32px !important;
    font-size: 15px !important;
    border-radius: 30px !important;
    background: linear-gradient(135deg, #ff4d6d, #b30000) !important;
    color: white !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold !important;
    margin-top: 16px !important;
}

.icons span {
    font-size: 26px;
    margin: 6px;
    display: inline-block;
    animation: wave 2.6s ease-in-out infinite;
}
.icons span:nth-child(2){animation-delay:.2s}
.icons span:nth-child(3){animation-delay:.4s}
.icons span:nth-child(4){animation-delay:.6s}
.icons span:nth-child(5){animation-delay:.8s}

.dear {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #b30000;
    text-shadow:
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,200,200,0.8),
        0 0 20px rgba(255,150,150,0.9);
    animation: softWave 4s ease-in-out infinite;
}
@keyframes softWave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

.letter-wrapper {
    max-height: 55vh;
    overflow-y: auto;
    padding-right: 5px;
}
.letter {
    text-align: right;
    line-height: 2.1;
    color: #7b0000;
    font-size: 15.5px;
    font-weight: 700;
}
.letter-paragraph {
    margin-bottom: 24px;
}

.header-bar {
    background: #ff7aa2;
    color: white;
   
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    text-align: center;
}
.memories-title {
    color: #ffb3c6;
    font-size: 26px;
    font-family: cursive;
    margin: 10px 0 20px;
    text-align: center;
}
.memory-card {
    background: #fff;
    border-radius: 25px;
    padding: 12px;
    margin-bottom: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,.25);
    position: relative;
}
.memory-card img,
.memory-card video {
    width: 100%;
    border-radius: 18px;
}
.memory-text {
    text-align: center;
    margin-top: 10px;
    color: #7b0000;
    font-weight: bold;
}
.footer-text {
    text-align: center;
    color: #ffdcdc;
    font-size: 18px;
    margin: 30px 0 15px;
}
.footer-btn {
    background: #ff7aa2;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 18px;
}

/* ===== الإضافة الوحيدة ===== */
.hidden-video { display: none; }
.video-wrapper { position: relative; }
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 32px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
}
</style>

<script>
// ========== الثلج ==========
function createSnowflake() {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "♥️";
    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (Math.random()*10+10)+"px";
    s.style.animationDuration = (Math.random()*5+5)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
}
setInterval(createSnowflake, 300);

// ========== الموسيقى العامة ==========
const AUDIO_SRC = "https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3";

document.addEventListener("DOMContentLoaded", () => {
    const bgMusic = document.createElement('audio');
    bgMusic.id = 'bgMusic';
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.preload = 'auto';
    bgMusic.src = AUDIO_SRC;
    document.body.appendChild(bgMusic);

    if (localStorage.getItem('playAudio') === 'true') {
        // كمّل من نفس المكان اللي وقف عنده
        const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
        bgMusic.addEventListener('canplay', () => {
            bgMusic.currentTime = savedTime;
            bgMusic.play().catch(() => {
                document.addEventListener('click', () => {
                    if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
                }, { once: true });
            });
        }, { once: true });

        // احفظ الـ currentTime كل ثانية
        setInterval(() => {
            if (!bgMusic.paused) {
                localStorage.setItem('audioTime', bgMusic.currentTime);
            }
        }, 1000);

        // احفظ قبل ما الصفحة تتغير
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioTime', bgMusic.currentTime);
        });
    }

    document.querySelectorAll('video').forEach(video => {
        video.addEventListener('play', () => {
            document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
            bgMusic.pause();
        });
        video.addEventListener('pause', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
        video.addEventListener('ended', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
    });
});

function startWithAudio() {
    localStorage.setItem('playAudio', 'true');
    const bg = document.getElementById('bgMusic');
    if (bg) bg.play().catch(()=>{});
    window.location.href = 'timeline.html';
}

function playVideo() {
    const v = document.getElementById("mainVideo");
    const b = document.getElementById("playBtn");
    if (v) { v.style.display = "block"; v.play(); }
    if (b) b.style.display = "none";
}
</script>

<style>
.quiz-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.quiz-card {
    background: #fff;
    border-radius: 30px;
    padding: 30px 22px 24px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
}
.q-emoji { font-size: 48px; margin-bottom: 10px; animation: wave 3s ease-in-out infinite; }
.q-text {
    font-size: 20px;
    font-weight: bold;
    color: #7b0000;
    line-height: 1.7;
    margin-bottom: 28px;
}
.choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.choice-btn {
    background: linear-gradient(135deg, #fff0f3, #ffe0e6);
    border: 2px solid #ffb3c6;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 16px;
    color: #7b0000;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.25s ease;
    width: 100%;
}
.choice-btn:active, .choice-btn:hover {
    background: linear-gradient(135deg, #ff4d6d, #b30000);
    color: white;
    border-color: #b30000;
    transform: scale(1.03);
}

/* video overlay */
.video-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.video-overlay.show {
    display: flex;
    animation: bgFadeIn 0.8s ease forwards;
}
@keyframes bgFadeIn {
    to { background: rgba(0,0,0,0.92); }
}
.video-box {
    opacity: 0;
    transform: scale(0.6) translateY(60px);
    animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
    width: 90%;
    max-width: 400px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,77,109,0.5);
}
@keyframes popIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.video-box video {
    width: 100%;
    display: block;
    border-radius: 24px;
}
.video-label {
    margin-top: 18px;
    color: #ffb3c6;
    font-size: 18px;
    font-weight: bold;
    opacity: 0;
    animation: fadeUp 0.6s ease 1s forwards;
    text-align: center;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}
.close-video {
    margin-top: 20px;
    background: linear-gradient(135deg, #ff4d6d, #b30000);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 30px;
    font-size: 15px;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.2s forwards;
}

/* hearts burst on answer */
.heart-pop {
    position: fixed;
    pointer-events: none;
    font-size: 22px;
    z-index: 200;
    animation: heartFloat 1.2s ease-out forwards;
}
@keyframes heartFloat {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4); }
}
</style>
</head>
<body>
<div class="quiz-wrap">
    <div class="quiz-card">
        <div class="q-emoji">🥺</div>
        <div class="q-text">مين اكتر حد بيحبه عبدو👀ّا؟</div>
        <div class="choices">
            <button class="choice-btn" onclick="answer(this, event)">البت لي لي</button>
            <button class="choice-btn" onclick="answer(this, event)">بنوته الحلوه</button>
            <button class="choice-btn" onclick="answer(this, event)">مدام عبدالرحمن علي</button>
            <button class="choice-btn" onclick="answer(this, event)">البت لولتي</button>
        </div>
    </div>
</div>

<!-- Video Overlay -->
<div class="video-overlay" id="videoOverlay">
    <div class="video-box">
        <video id="loveVideo" playsinline preload="none">
            <source src="https://res.cloudinary.com/dkym3urrn/video/upload/v1782588883/Snapchat-1367437462_yb7q7x.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-label">❤️ دا ليكي أنتي بس</div>
    <button class="close-video" onclick="goNext()">💌 الرسالة الأخيرة</button>
</div>

<script>
function answer(btn, e) {
    // قلوب بتطير
    for (let i = 0; i < 8; i++) {
        const h = document.createElement('div');
        h.className = 'heart-pop';
        h.textContent = ['❤','💕','🌹','✨','🥹'][Math.floor(Math.random()*5)];
        const angle = (i / 8) * Math.PI * 2;
        const dist = 50 + Math.random() * 40;
        h.style.left = e.clientX + 'px';
        h.style.top  = e.clientY + 'px';
        h.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
        h.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1300);
    }

    // إيقاف الأزرار
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

    // بعد ثانية: وقف الموسيقى وشغل الفيديو
    setTimeout(() => {
        const bgMusic = document.getElementById('bgMusic');
        if (bgMusic) bgMusic.pause();

        const overlay = document.getElementById('videoOverlay');
        const video   = document.getElementById('loveVideo');

        overlay.classList.add('show');
        video.play().catch(()=>{});

        // لما الفيديو يخلص: رجّع الموسيقى
        video.addEventListener('ended', () => {
            if (bgMusic && localStorage.getItem('playAudio') === 'true') {
                bgMusic.play().catch(()=>{});
            }
        }, { once: true });
    }, 600);
}

function goNext() {
    window.location.href = 'message.html';
}
</script>
</body>
</html>
