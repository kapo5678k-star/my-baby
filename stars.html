
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم ميلادك</title>

<style>
* { box-sizing: border-box; }
/* كرت الفيديو الأخير فقط */

.last-video-card {
    padding: 10px;
}

/* الفيديو نفسه */
.last-video {
    width: 1%;
    height: 550px;          /* المقاس اللي تحبيه */
    border-radius: 18px;
    object-fit: cover;     /* TikTok style */
    background: black;
}

/* لو عايزة تمنعي أي تكبير غصب */
.last-video::-webkit-media-controls-fullscreen-button {
    display: none;
}
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #7b0000, #b30000);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: stretch;
}

.lock-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.snowflake {
    position: fixed;
    top: -10px;
    color: white;
    pointer-events: none;
    animation: fall linear infinite;
    opacity: .9;
    z-index: 1;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    z-index: 2;
}

.card {
    background: #fff;
    border-radius: 30px;
    padding: 25px 20px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.year {
    background: #b22222;
    color: white;
    padding: 8px 30px;
    border-radius: 25px;
    font-size: 18px;
    display: inline-block;
    animation: yearPulse 2.5s ease-in-out infinite;
}
@keyframes yearPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-4px); }
    100% { transform: scale(1); }
}

.wave {
    animation: wave 3s ease-in-out infinite;
}
@keyframes wave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: 1px solid #ddd;
    font-size: 16px;
    margin-top: 15px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border-radius: 35px;
    background: #b22222;
    color: white;
    border: none;
    font-size: 17px;
    cursor: pointer;
}
.next-btn {
    width: fit-content !important;
    display: block;
    margin-left: auto !important;
    margin-right: auto !important;
    padding: 12px 32px !important;
    font-size: 15px !important;
    border-radius: 30px !important;
    background: linear-gradient(135deg, #ff4d6d, #b30000) !important;
    color: white !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold !important;
    margin-top: 16px !important;
}

.icons span {
    font-size: 26px;
    margin: 6px;
    display: inline-block;
    animation: wave 2.6s ease-in-out infinite;
}
.icons span:nth-child(2){animation-delay:.2s}
.icons span:nth-child(3){animation-delay:.4s}
.icons span:nth-child(4){animation-delay:.6s}
.icons span:nth-child(5){animation-delay:.8s}

.dear {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #b30000;
    text-shadow:
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,200,200,0.8),
        0 0 20px rgba(255,150,150,0.9);
    animation: softWave 4s ease-in-out infinite;
}
@keyframes softWave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

.letter-wrapper {
    max-height: 55vh;
    overflow-y: auto;
    padding-right: 5px;
}
.letter {
    text-align: right;
    line-height: 2.1;
    color: #7b0000;
    font-size: 15.5px;
    font-weight: 700;
}
.letter-paragraph {
    margin-bottom: 24px;
}

.header-bar {
    background: #ff7aa2;
    color: white;
   
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    text-align: center;
}
.memories-title {
    color: #ffb3c6;
    font-size: 26px;
    font-family: cursive;
    margin: 10px 0 20px;
    text-align: center;
}
.memory-card {
    background: #fff;
    border-radius: 25px;
    padding: 12px;
    margin-bottom: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,.25);
    position: relative;
}
.memory-card img,
.memory-card video {
    width: 100%;
    border-radius: 18px;
}
.memory-text {
    text-align: center;
    margin-top: 10px;
    color: #7b0000;
    font-weight: bold;
}
.footer-text {
    text-align: center;
    color: #ffdcdc;
    font-size: 18px;
    margin: 30px 0 15px;
}
.footer-btn {
    background: #ff7aa2;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 18px;
}

/* ===== الإضافة الوحيدة ===== */
.hidden-video { display: none; }
.video-wrapper { position: relative; }
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 32px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
}
</style>

<script>
// ========== الثلج ==========
function createSnowflake() {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "♥️";
    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (Math.random()*10+10)+"px";
    s.style.animationDuration = (Math.random()*5+5)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
}
setInterval(createSnowflake, 300);

// ========== الموسيقى العامة ==========
const AUDIO_SRC = "https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3";

document.addEventListener("DOMContentLoaded", () => {
    const bgMusic = document.createElement('audio');
    bgMusic.id = 'bgMusic';
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.preload = 'auto';
    bgMusic.src = AUDIO_SRC;
    document.body.appendChild(bgMusic);

    if (localStorage.getItem('playAudio') === 'true') {
        // كمّل من نفس المكان اللي وقف عنده
        const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
        bgMusic.addEventListener('canplay', () => {
            bgMusic.currentTime = savedTime;
            bgMusic.play().catch(() => {
                document.addEventListener('click', () => {
                    if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
                }, { once: true });
            });
        }, { once: true });

        // احفظ الـ currentTime كل ثانية
        setInterval(() => {
            if (!bgMusic.paused) {
                localStorage.setItem('audioTime', bgMusic.currentTime);
            }
        }, 1000);

        // احفظ قبل ما الصفحة تتغير
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioTime', bgMusic.currentTime);
        });
    }

    document.querySelectorAll('video').forEach(video => {
        video.addEventListener('play', () => {
            document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
            bgMusic.pause();
        });
        video.addEventListener('pause', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
        video.addEventListener('ended', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
    });
});

function startWithAudio() {
    localStorage.setItem('playAudio', 'true');
    const bg = document.getElementById('bgMusic');
    if (bg) bg.play().catch(()=>{});
    window.location.href = 'timeline.html';
}

function playVideo() {
    const v = document.getElementById("mainVideo");
    const b = document.getElementById("playBtn");
    if (v) { v.style.display = "block"; v.play(); }
    if (b) b.style.display = "none";
}
</script>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 28px 16px;
    min-height: 100vh;
}
.stars-wrap { max-width: 420px; width: 100%; }
.page-title { text-align:center; color:#fff; font-size:26px; font-weight:900; margin-bottom:6px; text-shadow:0 2px 8px rgba(0,0,0,.4); }
.page-sub { text-align:center; color:#ffb3c6; font-size:15px; margin-bottom:20px; }

.sky-card {
    background: linear-gradient(180deg, #0a0a2e, #1a1a4e);
    border-radius: 28px;
    padding: 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    min-height: 280px;
}
#starCanvas { width: 100%; height: 240px; display: block; }

.date-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    backdrop-filter: blur(4px);
}

.info-card {
    background: #fff;
    border-radius: 22px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
}
.info-title { font-size: 18px; font-weight: 900; color: #b30000; margin-bottom: 14px; text-align: center; }
.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #ffe0e8;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 14px; color: #888; }
.info-value { font-size: 15px; font-weight: bold; color: #7b0000; }

.next-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #ff4d6d, #b30000);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = 240 * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    const W = canvas.offsetWidth;
    const H = 240;

    // رسم نجوم عشوائية
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(0, 0, W, H);

    // نجوم صغيرة
    for (let i = 0; i < 150; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const r = Math.random() * 1.5;
        const alpha = Math.random() * 0.8 + 0.2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
    }

    // كوكبات
    const constellations = [
        // الجوزاء (Gemini - برج ليلة)
        { name: 'الجوزاء ♊', stars: [[80,60],[110,80],[95,110],[120,130],[75,130],[100,160],[80,185],[120,185]], lines: [[0,1],[1,2],[2,3],[2,4],[2,5],[5,6],[5,7]], color: '#ffd700' },
        // نجوم إضافية
        { name: '', stars: [[200,40],[230,70],[210,100],[250,90]], lines: [[0,1],[1,2],[1,3]], color: '#fff' },
        { name: '', stars: [[300,150],[330,130],[320,170],[350,160]], lines: [[0,1],[0,2],[2,3]], color: '#fff' },
    ];

    constellations.forEach(c => {
        // رسم الخطوط
        ctx.strokeStyle = c.color === '#ffd700' ? 'rgba(255,215,0,0.4)' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        c.lines.forEach(([a,b]) => {
            ctx.beginPath();
            ctx.moveTo(c.stars[a][0], c.stars[a][1]);
            ctx.lineTo(c.stars[b][0], c.stars[b][1]);
            ctx.stroke();
        });

        // رسم النجوم
        c.stars.forEach(([x,y]) => {
            ctx.beginPath();
            ctx.arc(x, y, c.color === '#ffd700' ? 3 : 2, 0, 2 * Math.PI);
            ctx.fillStyle = c.color;
            ctx.fill();
        });

        // اسم الكوكبة
        if (c.name) {
            ctx.fillStyle = 'rgba(255,215,0,0.8)';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(c.name, c.stars[0][0] + 20, c.stars[0][1] - 10);
        }
    });

    // القمر
    ctx.beginPath();
    ctx.arc(W - 50, 40, 22, 0, 2 * Math.PI);
    ctx.fillStyle = '#fffde7';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W - 40, 34, 18, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a4e';
    ctx.fill();
});
</script>
</head>
<body>
<div class="stars-wrap">
  <div class="page-title">⭐ سماء يوم ميلادك</div>
  <div class="page-sub">النجوم اللي كانت موجودة لما جيتي الدنيا ✨</div>

  <div class="sky-card">
    <div class="date-badge">1 يوليو 2009</div>
    <canvas id="starCanvas"></canvas>
  </div>

  <div class="info-card">
    <div class="info-title">🌟 معلوماتك النجمية</div>
    <div class="info-row">
      <span class="info-label">برجك</span>
      <span class="info-value">السرطان ♋</span>
    </div>
    <div class="info-row">
      <span class="info-label">كوكب يومك</span>
      <span class="info-value">القمر 🌙</span>
    </div>
    <div class="info-row">
      <span class="info-label">الكوكبة المسيطرة</span>
      <span class="info-value">الجوزاء ♊</span>
    </div>
    <div class="info-row">
      <span class="info-label">يوم الأسبوع</span>
      <span class="info-value">الأربعاء 💫</span>
    </div>
    <div class="info-row">
      <span class="info-label">صفات برجك</span>
      <span class="info-value">حنون، وفي، عاطفي ❤️</span>
    </div>
  </div>

  <button class="next-btn" onclick="window.location.href='ages.html'">
    اللي بعده👈
  </button>
</div>
</body>
</html>
