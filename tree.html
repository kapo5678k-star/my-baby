
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة حبنا 🌳</title>
    <style>
        :root {
            --primary-red: #ff4d6d;
            --dark-red: #b30000;
            --leaf-green: #2d6a4f;
            --trunk-brown: #582f0e;
            --bg-dark: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #2d0000, #1a0000);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .header h1 {
            font-size: 2rem;
            text-shadow: 0 0 15px var(--primary-red);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1rem;
            color: #ffb3c6;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.2);
            border: 2px solid rgba(255, 77, 109, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #treeCanvas {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 350px;
            z-index: 10;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-water {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
        }

        .btn-water:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }

        .btn-water:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: white;
            display: none;
            animation: fadeIn 1s ease forwards;
        }

        .moments {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .moment-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            opacity: 0.3;
        }

        .moment-card.active {
            opacity: 1;
            background: rgba(255, 77, 109, 0.1);
            border-color: var(--primary-red);
            transform: scale(1.05);
        }

        .moment-icon { font-size: 1.5rem; margin-bottom: 5px; }
        .moment-text { font-size: 0.8rem; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .heart {
            position: fixed;
            top: -10%;
            color: rgba(255, 77, 109, 0.3);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌳 شجرة حبنا</h1>
        <p id="status-text">كل قطرة مياه بتخلي حبنا يزهر أكتر... اسقيها يا روحي! 💧</p>
    </div>

    <div class="canvas-container">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-water" id="waterBtn" onclick="waterTree()">
            <span id="btn-icon">💧</span>
            <span id="btn-text">اسقي الشجرة</span>
        </button>
        <button class="btn btn-next" id="nextBtn" onclick="window.location.href='giftbox.html'">
            <span>🎁</span>
            <span>صندوق الهدايا</span>
        </button>
    </div>

    <div class="moments">
        <div class="moment-card" id="m1">
            <div class="moment-icon">🌱</div>
            <div class="moment-text">أول لقاء</div>
        </div>
        <div class="moment-card" id="m2">
            <div class="moment-icon">🌿</div>
            <div class="moment-text">كلامنا سوا</div>
        </div>
        <div class="moment-card" id="m3">
            <div class="moment-icon">🌸</div>
            <div class="moment-text">أول كلمة بحبك</div>
        </div>
        <div class="moment-card" id="m4">
            <div class="moment-icon">🌳</div>
            <div class="moment-text">مستقبلنا</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const waterBtn = document.getElementById('waterBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusText = document.getElementById('status-text');

        let width, height;
        let growLevel = 0;
        const maxLevel = 10;
        let branches = [];
        let leaves = [];
        let flowers = [];

        function init() {
            // Use a fixed internal resolution for consistency
            canvas.width = 800;
            canvas.height = 800;
            width = canvas.width;
            height = canvas.height;
            drawInitial();
        }

        function drawInitial() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#3e2723';
            ctx.beginPath();
            ctx.roundRect(width/2 - 50, height - 60, 100, 30, 10);
            ctx.fill();
        }

        class Branch {
            constructor(startX, startY, endX, endY, thickness, color) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.thickness = thickness;
                this.color = color;
                this.progress = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                const currentX = this.startX + (this.endX - this.startX) * this.progress;
                const currentY = this.startY + (this.endY - this.startY) * this.progress;
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.thickness;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                if (this.progress < 1) {
                    this.progress += 0.1; // Faster growth
                    return true;
                }
                return false;
            }
        }

        class Leaf {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = 0;
                this.maxSize = size;
                this.color = color;
            }

            draw() {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size, this.size * 1.5, Math.random() * Math.PI, 0, 2 * Math.PI);
                ctx.fillStyle = this.color;
                ctx.fill();
                if (this.size < this.maxSize) this.size += 0.5;
            }
        }

        function createBranch(x, y, angle, length, depth) {
            if (depth === 0) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;
            const thickness = depth * 3;
            const color = `rgb(${88 - depth * 5}, ${47 - depth * 2}, ${14})`;

            branches.push(new Branch(x, y, endX, endY, thickness, color));

            const subBranches = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < subBranches; i++) {
                const newAngle = angle + (Math.random() - 0.5) * 1.0;
                const newLength = length * (0.65 + Math.random() * 0.15);
                createBranch(endX, endY, newAngle, newLength, depth - 1);
            }

            if (depth <= 3) {
                for (let i = 0; i < 4; i++) {
                    leaves.push(new Leaf(
                        endX + (Math.random() - 0.5) * 20,
                        endY + (Math.random() - 0.5) * 20,
                        Math.random() * 8 + 4,
                        `rgba(${45 + Math.random() * 20}, ${106 + Math.random() * 40}, ${79 + Math.random() * 20}, 0.85)`
                    ));
                }
            }
            
            if (depth <= 2 && Math.random() > 0.6) {
                flowers.push({
                    x: endX,
                    y: endY,
                    size: 0,
                    maxSize: Math.random() * 6 + 5,
                    color: Math.random() > 0.5 ? '#ff4d6d' : '#ffb3c6'
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw base
            ctx.fillStyle = '#3e2723';
            ctx.beginPath();
            ctx.roundRect(width/2 - 60, height - 50, 120, 25, 15);
            ctx.fill();

            let stillGrowing = false;
            branches.forEach(b => {
                if (b.draw()) stillGrowing = true;
            });

            if (!stillGrowing) {
                leaves.forEach(l => l.draw());
                flowers.forEach(f => {
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, 2 * Math.PI);
                    ctx.fillStyle = f.color;
                    ctx.fill();
                    if (f.size < f.maxSize) f.size += 0.2;
                });
            }

            requestAnimationFrame(animate);
        }

        function waterTree() {
            if (growLevel < maxLevel) {
                growLevel++;
                updateUI();
                
                branches = [];
                leaves = [];
                flowers = [];
                
                // Adjusted scale to fit perfectly:
                // Start depth 3, max depth 7
                // Start length 60, max length 140
                const depth = Math.min(3 + Math.floor(growLevel / 2), 7);
                const length = 60 + growLevel * 8; 
                
                // Start drawing higher from the bottom to give more space
                createBranch(width / 2, height - 50, -Math.PI / 2, length, depth);
            }
        }

        function updateUI() {
            const btnText = document.getElementById('btn-text');
            btnText.textContent = `اسقيها كمان (${growLevel}/${maxLevel})`;
            
            if (growLevel >= 3) document.getElementById('m1').classList.add('active');
            if (growLevel >= 5) document.getElementById('m2').classList.add('active');
            if (growLevel >= 8) document.getElementById('m3').classList.add('active');
            
            if (growLevel === maxLevel) {
                document.getElementById('m4').classList.add('active');
                waterBtn.disabled = true;
                btnText.textContent = "اكتملت شجرة حبنا! ❤️";
                document.getElementById('btn-icon').textContent = "🌳";
                statusText.textContent = "شوفي يا روحي شجرتنا بقت عاملة إزاي! زي حبنا بالظبط 😍";
                nextBtn.style.display = "flex";
                
                for(let i=0; i<20; i++) {
                    setTimeout(createHeart, i * 100);
                }
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        setInterval(createHeart, 500);
        init();
        animate();

        // --- الموسيقى ---
        // صفحة الشجرة معندها مش عندها bgMusic بتاع BASE_STYLE، فبنعمل عنصر صوت خاص بيها
        // لكن بنخليه يكمل من نفس اللحظة المحفوظة (audioTime) بدل ما يرجع للأول
        const treeAudio = new Audio("https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3");
        treeAudio.loop = true;
        treeAudio.volume = 0.7;

        function startTreeMusic() {
            treeAudio.play().catch(() => {});
            document.removeEventListener('click', startTreeMusic);
            document.removeEventListener('touchstart', startTreeMusic);
        }

        function resumeTreeAudio() {
            const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
            if (savedTime > 0) {
                treeAudio.currentTime = savedTime;
            }
        }

        if (localStorage.getItem('playAudio') === 'true') {
            if (treeAudio.readyState >= 1) {
                resumeTreeAudio();
            } else {
                treeAudio.addEventListener('loadedmetadata', resumeTreeAudio, { once: true });
            }
            treeAudio.play().catch(() => {
                document.addEventListener('click', startTreeMusic);
                document.addEventListener('touchstart', startTreeMusic);
            });

            // واصل تحديث المكان المحفوظ كل ثانية عشان الصفحة الجاية تستأنف منه
            setInterval(() => {
                if (!treeAudio.paused) {
                    localStorage.setItem('audioTime', treeAudio.currentTime);
                }
            }, 1000);

            window.addEventListener('beforeunload', () => {
                localStorage.setItem('audioTime', treeAudio.currentTime);
            });
        } else {
            document.addEventListener('click', startTreeMusic);
            document.addEventListener('touchstart', startTreeMusic);
        }
    </script>
</body>
</html>
