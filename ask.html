
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    
<style>
* { box-sizing: border-box; }
/* كرت الفيديو الأخير فقط */

.last-video-card {
    padding: 10px;
}

/* الفيديو نفسه */
.last-video {
    width: 1%;
    height: 550px;          /* المقاس اللي تحبيه */
    border-radius: 18px;
    object-fit: cover;     /* TikTok style */
    background: black;
}

/* لو عايزة تمنعي أي تكبير غصب */
.last-video::-webkit-media-controls-fullscreen-button {
    display: none;
}
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #7b0000, #b30000);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: stretch;
}

.lock-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.snowflake {
    position: fixed;
    top: -10px;
    color: white;
    pointer-events: none;
    animation: fall linear infinite;
    opacity: .9;
    z-index: 1;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    z-index: 2;
}

.card {
    background: #fff;
    border-radius: 30px;
    padding: 25px 20px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.year {
    background: #b22222;
    color: white;
    padding: 8px 30px;
    border-radius: 25px;
    font-size: 18px;
    display: inline-block;
    animation: yearPulse 2.5s ease-in-out infinite;
}
@keyframes yearPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-4px); }
    100% { transform: scale(1); }
}

.wave {
    animation: wave 3s ease-in-out infinite;
}
@keyframes wave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: 1px solid #ddd;
    font-size: 16px;
    margin-top: 15px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border-radius: 35px;
    background: #b22222;
    color: white;
    border: none;
    font-size: 17px;
    cursor: pointer;
}
.next-btn {
    width: fit-content !important;
    display: block;
    margin-left: auto !important;
    margin-right: auto !important;
    padding: 12px 32px !important;
    font-size: 15px !important;
    border-radius: 30px !important;
    background: linear-gradient(135deg, #ff4d6d, #b30000) !important;
    color: white !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold !important;
    margin-top: 16px !important;
}

.icons span {
    font-size: 26px;
    margin: 6px;
    display: inline-block;
    animation: wave 2.6s ease-in-out infinite;
}
.icons span:nth-child(2){animation-delay:.2s}
.icons span:nth-child(3){animation-delay:.4s}
.icons span:nth-child(4){animation-delay:.6s}
.icons span:nth-child(5){animation-delay:.8s}

.dear {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #b30000;
    text-shadow:
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,200,200,0.8),
        0 0 20px rgba(255,150,150,0.9);
    animation: softWave 4s ease-in-out infinite;
}
@keyframes softWave {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

.letter-wrapper {
    max-height: 55vh;
    overflow-y: auto;
    padding-right: 5px;
}
.letter {
    text-align: right;
    line-height: 2.1;
    color: #7b0000;
    font-size: 15.5px;
    font-weight: 700;
}
.letter-paragraph {
    margin-bottom: 24px;
}

.header-bar {
    background: #ff7aa2;
    color: white;
   
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    text-align: center;
}
.memories-title {
    color: #ffb3c6;
    font-size: 26px;
    font-family: cursive;
    margin: 10px 0 20px;
    text-align: center;
}
.memory-card {
    background: #fff;
    border-radius: 25px;
    padding: 12px;
    margin-bottom: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,.25);
    position: relative;
}
.memory-card img,
.memory-card video {
    width: 100%;
    border-radius: 18px;
}
.memory-text {
    text-align: center;
    margin-top: 10px;
    color: #7b0000;
    font-weight: bold;
}
.footer-text {
    text-align: center;
    color: #ffdcdc;
    font-size: 18px;
    margin: 30px 0 15px;
}
.footer-btn {
    background: #ff7aa2;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 18px;
}

/* ===== الإضافة الوحيدة ===== */
.hidden-video { display: none; }
.video-wrapper { position: relative; }
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 32px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
}
</style>

<script>
// ========== الثلج ==========
function createSnowflake() {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "♥️";
    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (Math.random()*10+10)+"px";
    s.style.animationDuration = (Math.random()*5+5)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
}
setInterval(createSnowflake, 300);

// ========== الموسيقى العامة ==========
const AUDIO_SRC = "https://res.cloudinary.com/dkym3urrn/video/upload/v1777853601/Bahaa_Sultan_Ma3aya_2025_%D8%A8%D9%87%D8%A7%D8%A1_%D8%B3%D9%84%D8%B7%D8%A7%D9%86_%D9%85%D8%B9%D8%A7%D9%8A%D8%A7_%D8%A3%D8%BA%D9%86%D9%8A%D8%A9_%D9%81%D9%8A%D9%84%D9%85_%D9%88%D9%84__cut_148sec_jciivv.mp3";

document.addEventListener("DOMContentLoaded", () => {
    const bgMusic = document.createElement('audio');
    bgMusic.id = 'bgMusic';
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.preload = 'auto';
    bgMusic.src = AUDIO_SRC;
    document.body.appendChild(bgMusic);

    if (localStorage.getItem('playAudio') === 'true') {
        // كمّل من نفس المكان اللي وقف عنده
        const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
        bgMusic.addEventListener('canplay', () => {
            bgMusic.currentTime = savedTime;
            bgMusic.play().catch(() => {
                document.addEventListener('click', () => {
                    if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
                }, { once: true });
            });
        }, { once: true });

        // احفظ الـ currentTime كل ثانية
        setInterval(() => {
            if (!bgMusic.paused) {
                localStorage.setItem('audioTime', bgMusic.currentTime);
            }
        }, 1000);

        // احفظ قبل ما الصفحة تتغير
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioTime', bgMusic.currentTime);
        });
    }

    document.querySelectorAll('video').forEach(video => {
        video.addEventListener('play', () => {
            document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
            bgMusic.pause();
        });
        video.addEventListener('pause', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
        video.addEventListener('ended', () => {
            if (localStorage.getItem('playAudio') === 'true') bgMusic.play().catch(()=>{});
        });
    });
});

function startWithAudio() {
    localStorage.setItem('playAudio', 'true');
    const bg = document.getElementById('bgMusic');
    if (bg) bg.play().catch(()=>{});
    window.location.href = 'timeline.html';
}

function playVideo() {
    const v = document.getElementById("mainVideo");
    const b = document.getElementById("playBtn");
    if (v) { v.style.display = "block"; v.play(); }
    if (b) b.style.display = "none";
}
</script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .ask-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .ask-card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        .ask-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .question {
            font-size: 24px;
            color: #b30000;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        #yesBtn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: auto;
            min-width: 100px;
        }
        #noBtn {
            background: #f44336;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            min-width: 100px;
        }
        .success-msg {
            display: none;
            font-size: 28px;
            color: #b30000;
            font-weight: bold;
            margin-top: 20px;
            animation: heartBeat 1.5s infinite;
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <audio id="askMusic" loop preload="auto">
        <source src="https://res.cloudinary.com/dkym3urrn/video/upload/v1777872770/%D8%B1%D8%A8%D9%86%D8%A7_%D9%86%D8%B5%D8%B1%D9%86%D9%8I_lmyvuy.mp4" type="audio/mpeg">
    </audio>
    <audio id="noSound" preload="auto">
        <source src="https://res.cloudinary.com/dkym3urrn/video/upload/v1777902276/Michael_Scott_No_God__Please_No__Meme_The_Office_Meme__cut_4sec_n3lv1j.mp3" type="audio/mpeg">
    </audio>
    <div class="container ask-container">
        <div class="ask-card" id="mainCard">
            <img id="displayImg" class="ask-img" src="https://res.cloudinary.com/dkym3urrn/image/upload/v1777855446/%D8%AA%D9%86%D8%B2%D9%8A%D9%84_kwa15d.jpg" alt="Cute gif">
            <div id="questionText" class="question">هل انتي بتحبيني؟</div>
            <div class="btn-group" id="btnGroup">
                <button id="yesBtn" onclick="sayYes()">Yes</button>
                <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
            </div>
            <div id="successMsg" class="success-msg">
                🥺♥️ وانا بدمنك
                <br>
                <button class="next-btn" onclick="window.location.href='galaxy.html'" style="margin-top: 20px;">اللي بعده👈</button>
            </div>
        </div>
    </div>

    <script>
        let yesSize = 18;
        let noClicks = 0;

        function moveNo() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const noSound = document.getElementById('noSound');

            // تشغيل الصوت المرح
            if (noSound) {
                noSound.currentTime = 0;
                noSound.play().catch(e => console.log("Sound play pending interaction"));
            }
            
            // تكبير زر Yes
            yesSize += 15;
            yesBtn.style.fontSize = yesSize + 'px';
            yesBtn.style.padding = (yesSize * 0.8) + 'px ' + (yesSize * 1.6) + 'px';
            
            // تحريك زر No لمكان عشوائي
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            noClicks++;
        }

        function sayYes() {
            const noSound = document.getElementById('noSound');
            if (noSound) {
                noSound.pause();
                noSound.currentTime = 0;
            }
            const music = document.getElementById('askMusic');
            if (music) {
                music.volume = 1.0;
                music.play().catch(e => console.log("Audio play pending interaction"));
            }
            const mainCard = document.getElementById('mainCard');
            const displayImg = document.getElementById('displayImg');
            const questionText = document.getElementById('questionText');
            const btnGroup = document.getElementById('btnGroup');
            const successMsg = document.getElementById('successMsg');
            const noBtn = document.getElementById('noBtn');

            // تغيير الصورة والرسالة
            displayImg.src = "https://res.cloudinary.com/dkym3urrn/image/upload/v1777855445/85c3ed6e-1e6f-478d-ac13-0da2d8f246f2_svqeno.jpg";
            questionText.style.display = 'none';
            btnGroup.style.display = 'none';
            noBtn.style.display = 'none';
            successMsg.style.display = 'block';

            // إطلاق الشماريخ (الاحتفال)
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
